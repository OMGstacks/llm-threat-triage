# PROJECT_FACTS.yml
#
# Copy this file to PROJECT_FACTS.yml in your project root and fill in the
# fields that apply. This is the ONE file the generalized CLAUDE.md modules,
# slash commands, and hooks in this toolkit are designed to reference for
# project-specific facts (host names, paths, conventions) — the goal is that
# adopting a new project means editing this one file instead of hand-editing
# CLAUDE.md plus eight separate command markdown files, each of which would
# otherwise carry its own copy of the same host/path facts and drift apart.
#
# Every field below is commented out with an example value. Uncomment and
# edit the ones that apply to your project; leave the rest commented out or
# delete them. A missing field means "not applicable to this project" — the
# commands/modules that read this file are written to degrade gracefully
# (skip the step, note it as N/A) rather than fail when a section is absent.
#
# This file is a plain facts sheet, not a secrets store — never put an
# actual password, API key, or token in this file. Use secret_locations
# below to record WHERE the secret lives (a path, a secrets manager key,
# an env var name), never the secret value itself.

# ---------------------------------------------------------------------------
# Remote deploy target
# ---------------------------------------------------------------------------
# Fill this in if your project deploys to a remote host you SSH into or
# otherwise administer directly (VPS, bare-metal, cloud VM). Corresponds to
# CLAUDE-MD/modules/deploy-surface.md and commands/deploy-ops.md.

# deploy_host: not applicable — no fixed, provisioned production host exists yet.
#   Deploy TOOLING exists (spine/deploy/: docker-compose.yml [dev] /
#   docker-compose.beta.yml [auth + fail-closed] / docker-compose.tls.yml [Caddy
#   reverse proxy] overlays, per spine/deploy/README.md), but it's "bring your own
#   host" — the runbook describes standing up the studio on whatever host you choose,
#   not a named, currently-live one. If a specific host is provisioned, fill in
#   deploy_host/deploy_user/app_directory here at that time.

# deploy_user: not applicable — see deploy_host note above.

# app_directory: not applicable — see deploy_host note above.

# ---------------------------------------------------------------------------
# Secrets — locations only, never values
# ---------------------------------------------------------------------------

secret_locations:
  osai_auth_secret: "spine/deploy/secrets/osai_auth_secret (Docker secrets file, beta compose overlay)"
  anthropic_api_key: "spine/deploy/secrets/anthropic_api_key, mounted at /run/secrets/anthropic_api_key (llm compose overlay only — the tutor's generative path is OFF by default)"
  server_seed_env_var: "OSAI_SERVER_SEED (env var, not a file — flag-derivation seed, generate with openssl rand -hex 32)"
  admin_users_env_var: "OSAI_ADMIN_USERS (env var — instructor account emails, not a secret value but not committed either)"
  secrets_manager: "none — plain Docker secrets files under spine/deploy/secrets/ (gitignored), no external manager"

# ---------------------------------------------------------------------------
# Container / runtime topology
# ---------------------------------------------------------------------------
# Fill this in if your deploy target runs multiple containers/processes and
# it's non-obvious which one talks to which (e.g. "the host's own postgres is
# stale; the app container talks to a separate db container").

container_topology:
  grader_container: "grader — FastAPI grader API (Dockerfile.grader), vendors the
    detection engine + reference corpus. Not published externally in beta (web-only
    is public); auth + cookie/CSRF + fail-closed guard when OSAI_PUBLIC is set."
  labtarget_container: "labtarget — deliberately-vulnerable lab-target
    (Dockerfile.labtarget), one image serves any lab via the OSAI_LAB env var.
    Deny-all egress by design (platform threat model)."
  web_container: "web — Next.js front-end (Dockerfile.web), standalone production
    build, non-root. The only container exposed publicly in the beta profile."
  notes: >
    No database container — the fact store is flat JSON files (spine/facts/), not a
    running DB service. docker-compose.tls.yml adds a Caddy reverse-proxy container
    terminating HTTPS in front of web only.
  exec_pattern_python: "docker run --rm osai-grader:ci python -c \"...\" (or
    docker exec into a running compose service by name, e.g. `docker compose exec
    grader python -c \"...\"`)"

# ---------------------------------------------------------------------------
# Database migrations
# ---------------------------------------------------------------------------
# Fill this in if your project has a versioned database schema. Corresponds
# to CLAUDE-MD/modules/database-migrations.md and commands/migration.md.

# migration_directory_convention: not applicable — no migrations/ directory and no
#   versioned schema. The fact store (spine/facts/, spine/banks/, spine/gold/) is flat
#   JSON, versioned by git history directly, not by an incremental migration chain.

# ---------------------------------------------------------------------------
# Scheduled data pipelines
# ---------------------------------------------------------------------------
# Fill this in if your project has scheduled jobs whose output other things
# depend on. Corresponds to CLAUDE-MD/modules/pipeline-automation-levels.md.

# scheduled_pipelines: not applicable — no cron/scheduler exists. Content generation
#   (lessons, quiz banks, gold-set items) runs on demand via the CLI, not on a schedule.

# ---------------------------------------------------------------------------
# Automated remediation / watchdogs
# ---------------------------------------------------------------------------
# Fill this in if your project runs any loop that can restart/disable/mutate
# a live service without a human approving each action. Corresponds to
# CLAUDE-MD/modules/automated-remediation.md.

# automated_remediation: not applicable — no watchdog or automated restart/mutate loop
#   exists. The "fail-closed guard" (auth.enforce_deploy_policy, CI gate
#   docker-fail-closed-guard) is a preflight CHECK that refuses to start, not a running
#   remediation loop that acts on a live service — no sensor/actuator/cooldown table
#   applies here.

# ---------------------------------------------------------------------------
# Git / branching conventions
# ---------------------------------------------------------------------------

default_branch_name: "main"

# ---------------------------------------------------------------------------
# Cognition OS toolkit component locations (usually the installer's defaults)
# ---------------------------------------------------------------------------
# Only change these if you moved a component to a non-default location after
# running init.py.

memory_file_path: ".cognition/memory/MEMORY.md"
friction_log_path: ".cognition/friction/friction_log.jsonl"
gates_file_path: ".cognition/ci-governance/gates.yml"
codebase_index_output_dir: "docs/codebase_index/"

# ---------------------------------------------------------------------------
# CI
# ---------------------------------------------------------------------------

ci_provider: "github-actions"
ci_workflow_path: "../.github/workflows/osai-spine.yml"   # lives at repo root, not here
# local_ci_script_path: not applicable — no local-CI mirror script exists; the spine
# job's checks (validate-manifests, pytest, factstore validate, goldset, etc.) are run
# directly via `python -m osai_spine.cli <subcommand>` from spine/, matching what CI runs.
