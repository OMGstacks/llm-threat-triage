name: OSAI Spine

on:
  push:
    branches: [ main, master, "claude/**" ]
    paths:
      - "osai-prep-studio/spine/**"
      - "osai-prep-studio/web/**"
      - "reference/**"
      - "projects/llm-log-triage/src/detectors.py"
      - ".github/workflows/osai-spine.yml"
  pull_request:
    paths:
      - "osai-prep-studio/spine/**"
      - "osai-prep-studio/web/**"
      - "reference/**"
      - "projects/llm-log-triage/src/detectors.py"

jobs:
  spine:
    name: spine core (stdlib-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: osai-prep-studio/spine
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps (package core is stdlib-only)
        run: pip install pytest
      - name: Validate lab manifests (taxonomy gate)
        run: python -m osai_spine.cli validate-manifests
      - name: Run spine test suite (FastAPI tests auto-skip here)
        run: python -m pytest -q
      - name: Tutor ship gate (gold set — no hallucination / abstain / refuse / no leak)
        run: python -m osai_spine.cli goldset
      - name: Transcript sign-off self-redteam (no learner-content leak — 24-*)
        run: |
          python -c "import sys; from osai_spine import selfredteam; \
            r = selfredteam.run(); \
            print('self-redteam probes:', len(r['probes']), 'all_clean:', r['all_clean']); \
            [print('  LEAK', p['id'], '->', p['detail']) for p in r['probes'] if not p['ok']]; \
            sys.exit(0 if r['all_clean'] else 1)"
      - name: Transcript sign-off control checks pass (redaction / store / base-url)
        run: |
          python -c "import sys; from osai_spine import signoff; \
            rep = signoff.run_preflight(); \
            bad = [c['id'] for c in rep['checks'] if c['kind']=='control' and not c['ok']]; \
            print('control checks failed:', bad or 'none'); \
            sys.exit(0 if not bad else 1)"
      - name: Assert transcript judging is OFF in CI (fail-closed)
        run: |
          python -c "import sys; from osai_spine import llm; \
            off = (not llm.transcripts_enabled()) and (not llm.key_present()); \
            print('transcripts_enabled:', llm.transcripts_enabled(), 'key_present:', llm.key_present()); \
            sys.exit(0 if off else 1)"
      - name: Smoke-test the catalog command
        run: python -m osai_spine.cli catalog

  prod-api:
    name: prod API (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: osai-prep-studio/spine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install prod + dev deps
        run: pip install -r requirements-dev.txt
      - name: Run full suite incl. FastAPI api tests
        run: python -m pytest -q

  docker:
    name: docker images build
    runs-on: ubuntu-latest
    env:
      DEPLOY: osai-prep-studio/spine/deploy
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose configs (dev, beta, overlays)
        run: |
          docker compose -f $DEPLOY/docker-compose.yml config -q
          docker compose -f $DEPLOY/docker-compose.yml -f $DEPLOY/docker-compose.ollama.yml --profile pull config -q
          OSAI_ADMIN_USERS=ci@example.com OSAI_SERVER_SEED=ci-seed \
            docker compose -f $DEPLOY/docker-compose.beta.yml config -q
          OSAI_ADMIN_USERS=ci@example.com OSAI_SERVER_SEED=ci-seed \
            docker compose -f $DEPLOY/docker-compose.beta.yml -f $DEPLOY/docker-compose.tls.yml config -q
      - name: Build grader image
        run: docker build -f $DEPLOY/Dockerfile.grader -t osai-grader:ci .
      - name: Build lab-target image
        run: docker build -f $DEPLOY/Dockerfile.labtarget -t osai-labtarget:ci .
      - name: Build web image (standalone Next.js)
        run: docker build -f $DEPLOY/Dockerfile.web -t osai-web:ci .
      - name: Smoke-run the grader container
        run: |
          docker run -d --name grader -p 8077:8077 -e OSAI_SERVER_SEED=ci osai-grader:ci
          for i in $(seq 1 15); do curl -sf http://127.0.0.1:8077/health && break; sleep 2; done
          curl -sf http://127.0.0.1:8077/health | grep -q '"status":"ok"'
          docker rm -f grader
      - name: Fail-closed guard fires on an unsecured public deploy
        run: |
          if docker run --rm -e OSAI_PUBLIC=1 osai-grader:ci \
               python -c "from osai_spine import auth; auth.enforce_deploy_policy()"; then
            echo "guard did NOT fail closed"; exit 1
          else
            echo "OK: guard fails closed on OSAI_PUBLIC=1 without auth"
          fi
