# gates.yml — single source of truth for this project's CI gate surface, ON THIS BRANCH
# (claude/cc-cert-learning-plan-xqo5g7 — carries the REAL spine/cc_spine application code,
# unlike the cognition-substrate-only version of this same project on `main`; see this
# project's own MEMORY.md and PROJECT_FACTS.yml for the branch-split context).
#
# Captures what ../../.github/workflows/cc-spine.yml already does (17 sequential gate
# steps in one job), in the toolkit's declarative format. NOT YET adopted as the generator
# of cc-spine.yml itself (gen_ci.py --write has not been run against it) — that file
# remains the hand-authored, currently working CI.
#
# Adoption tradeoff worth noting explicitly: cc-spine.yml runs all 17 steps in ONE job
# sharing a single checkout + Python matrix setup. Because gates.yml's model is one job
# PER gate, a naive `gen_ci.py --write` adoption would multiply checkout/setup overhead by
# ~17x. Adopting this file as the real generator (not just documentation) would need
# either accepting that overhead or extending the schema with a "batch these gates into one
# job" grouping primitive that doesn't exist yet — a real design decision, not a mechanical
# step, and explicitly out of scope for this pass.

version: 1

gates:
  - name: cc-scaffold-validate
    description: "Scaffold gate (JSON, matrix, registry joins, banks, no-transcript rule)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.scaffold_validate"
    extra_yaml: |
      defaults:
        run:
          working-directory: cc-master-learning-center/spine
      strategy:
        matrix:
          python-version: ["3.10", "3.11", "3.12"]

  - name: cc-source-freshness-guard
    description: "Source-registry freshness guard"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli validate-sources"

  - name: cc-ip-boundary-guard
    description: "IP-boundary support-span guard"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli check-ip"

  - name: cc-factstore-validate
    description: "Fact-store validator (drift, tombstones, eligibility, unsupported-claim guard)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli factstore validate"

  - name: cc-quiz-gate
    description: "Quiz-engine gate (gold grounding, answer-key isolation, near-duplicate stems)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli quiz validate"

  - name: cc-holdout-lane-gate
    description: "Holdout-lane gate (same item gates + physical partition + no leak into practice)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli quiz validate-holdout"

  - name: cc-learner-export-leakage-scan
    description: "Learner-export leakage scan (no answer-bearing field reaches the learner lane)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli quiz export-learner > /tmp/learner_export.json
      if grep -qE '"(correct_index|correct|answer|answer_key_ref|answer_key_hash|item_hash|rationale_refs|rationales|distractor_misconceptions|fact_ids|expected_keywords|source_policy|status|holdout|misconception_tags)"[[:space:]]*:' /tmp/learner_export.json; then
        echo "FAIL: learner export contains an answer-bearing field"; exit 1
      fi
      echo "OK: learner export carries no answer-bearing field"

  - name: cc-presented-quiz-leakage-scan
    description: "Presented-quiz leakage scan (shuffled render carries no answer/order secret)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli quiz render --attempt-seed ci-attempt > /tmp/render.json
      if grep -qE '"(correct_index|correct|answer|answer_key_ref|answer_key_hash|item_hash|rationale_refs|rationales|distractor_misconceptions|fact_ids|expected_keywords|source_policy|status|holdout|misconception_tags|choice_order)"[[:space:]]*:' /tmp/render.json; then
        echo "FAIL: presented quiz contains an answer-bearing field"; exit 1
      fi
      echo "OK: presented (shuffled) quiz carries no answer-bearing field"

  - name: cc-learner-state-demo
    description: "Learner-state demo (replay a synthetic stream; writes no learner data)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli learner replay --attempts tests/fixtures/synthetic_attempt_stream.json --now 5"

  - name: cc-mock-exam-assembler-gate
    description: "Mock-exam assembler gate (policy-conformant draw; scenarios holdout-only)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m cc_spine.cli mock validate --draw-key ci-mock --count 15"

  - name: cc-mock-exposure-receipt-gate
    description: "Mock exposure-receipt gate (render path emits the burn receipt and leaks no content)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli mock render --draw-key ci-mock --count 15 > /tmp/mock_receipt.json
      grep -q '"exposed_holdout_ids"' /tmp/mock_receipt.json || { echo "FAIL: no exposure receipt"; exit 1; }
      if grep -qE '"(stem|choices|correct_index|correct|answer|answer_key_ref|rationale_refs|item_hash|distractor_misconceptions)"[[:space:]]*:' /tmp/mock_receipt.json; then
        echo "FAIL: mock render leaked a content/answer-bearing field"; exit 1
      fi
      echo "OK: mock render emits the burn receipt and carries no content"

  - name: cc-variant-intake-gate
    description: "Variant-intake gate (deterministic locked prompt; good candidate drafts; attack rejected)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli variant prompt --item-id D1.1.4.scenario.0001 --draw-key ci-variant > /tmp/vprompt_a.txt
      python -m cc_spine.cli variant prompt --item-id D1.1.4.scenario.0001 --draw-key ci-variant > /tmp/vprompt_b.txt
      cmp /tmp/vprompt_a.txt /tmp/vprompt_b.txt || { echo "FAIL: prompt not deterministic"; exit 1; }
      python -m cc_spine.cli variant ingest --item-id D1.1.4.scenario.0001 --draw-key ci-variant \
        --candidate tests/fixtures/variant_candidate_good.json --out /tmp/variant-drafts
      if python -m cc_spine.cli variant ingest --item-id D1.1.4.scenario.0001 --draw-key ci-variant \
        --candidate tests/fixtures/variant_candidate_keyed_wrong_choice.json --out /tmp/variant-drafts; then
        echo "FAIL: attack candidate was accepted"; exit 1
      fi
      echo "OK: variant intake gates hold"

  - name: cc-readiness-dashboard-gate
    description: "Readiness-dashboard gate (deterministic content-free projection; no answer/PII field)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli dashboard --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 > /tmp/dash_a.json
      python -m cc_spine.cli dashboard --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 > /tmp/dash_b.json
      cmp /tmp/dash_a.json /tmp/dash_b.json || { echo "FAIL: dashboard not deterministic"; exit 1; }
      if grep -qE '"(stem|choices|correct_index|correct|answer|answer_key_ref|answer_key_hash|item_hash|rationale_refs|correction|one_sentence_rule|trap|distractor_misconceptions|selected_index|fact_ids|expected_keywords|name|email|user|username)"[[:space:]]*:' /tmp/dash_a.json; then
        echo "FAIL: dashboard contains an answer-bearing or PII field"; exit 1
      fi
      echo "OK: dashboard is deterministic and content-free"

  - name: cc-readiness-dashboard-html-gate
    description: "Readiness-dashboard HTML gate (deterministic visual render; no answer field)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli dashboard --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 --html > /tmp/dash_a.html
      python -m cc_spine.cli dashboard --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 --html > /tmp/dash_b.html
      cmp /tmp/dash_a.html /tmp/dash_b.html || { echo "FAIL: dashboard HTML not deterministic"; exit 1; }
      if grep -qE 'correct_index|answer_key_ref|answer_key_hash|item_hash|rationale_refs|distractor_misconceptions|selected_index|choices|fact_ids|expected_keywords' /tmp/dash_a.html; then
        echo "FAIL: dashboard HTML contains an answer-bearing field"; exit 1
      fi
      echo "OK: dashboard HTML is deterministic and content-free"

  - name: cc-cram-sheet-gate
    description: "Cram-sheet gate (deterministic weak-area packet; no isolated-key field)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli cram-sheet --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 > /tmp/cram_a.json
      python -m cc_spine.cli cram-sheet --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 > /tmp/cram_b.json
      cmp /tmp/cram_a.json /tmp/cram_b.json || { echo "FAIL: cram sheet not deterministic"; exit 1; }
      if grep -qE '"(choices|correct_index|answer_key_ref|rationale_refs|distractor_misconceptions|answer_key_hash|item_hash|selected_index|fact_ids|expected_keywords)"[[:space:]]*:' /tmp/cram_a.json; then
        echo "FAIL: cram sheet contains an answer-key/PII field"; exit 1
      fi
      echo "OK: cram sheet is deterministic and carries no answer-key/PII field"

  - name: cc-cram-sheet-html-gate
    description: "Cram-sheet HTML gate (deterministic visual render; no answer-bearing field)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli cram-sheet --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 --html > /tmp/cram_a.html
      python -m cc_spine.cli cram-sheet --attempts tests/fixtures/synthetic_attempt_stream.json --now 5 --html > /tmp/cram_b.html
      cmp /tmp/cram_a.html /tmp/cram_b.html || { echo "FAIL: cram sheet HTML not deterministic"; exit 1; }
      if grep -qE 'correct_index|answer_key_ref|answer_key_hash|item_hash|rationale_refs|distractor_misconceptions|selected_index|choices|fact_ids|expected_keywords' /tmp/cram_a.html; then
        echo "FAIL: cram sheet HTML contains an answer-bearing field"; exit 1
      fi
      echo "OK: cram sheet HTML is deterministic and carries no answer-bearing field"

  - name: cc-spine-test-suite
    description: "Spine test suite (stdlib unittest — no third-party deps)"
    group: "spine"
    command: "cd cc-master-learning-center/spine && python -m unittest discover -s tests"

  - name: cc-ingestion-determinism-smoke
    description: "Ingestion determinism smoke (dictionary + note are reproducible)"
    group: "spine"
    non_pytest: true
    sibling_test_gate: cc-spine-test-suite
    command: |
      cd cc-master-learning-center/spine
      python -m cc_spine.cli ingest --source tests/fixtures/sample_transcript.txt \
        --source-doc-id sample-transcript --out /tmp/note_a.md
      python -m cc_spine.cli ingest --source tests/fixtures/sample_transcript.txt \
        --source-doc-id sample-transcript --out /tmp/note_b.md
      cmp /tmp/note_a.md /tmp/note_b.md
      echo "OK: ingestion is deterministic"
