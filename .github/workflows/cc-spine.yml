name: CC Spine

on:
  push:
    branches: [ main, master, "claude/**" ]
    paths:
      - "cc-master-learning-center/**"
      - ".github/workflows/cc-spine.yml"
  pull_request:
    paths:
      - "cc-master-learning-center/**"
      - ".github/workflows/cc-spine.yml"

jobs:
  spine:
    name: cc spine core (stdlib-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cc-master-learning-center/spine
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Scaffold gate (JSON, matrix, registry joins, banks, no-transcript rule)
        run: python -m cc_spine.scaffold_validate
      - name: Source-registry freshness guard (source_freshness_guard)
        run: python -m cc_spine.cli validate-sources
      - name: IP-boundary support-span guard (ip_boundary_guard)
        run: python -m cc_spine.cli check-ip
      - name: Spine test suite (stdlib unittest — no third-party deps)
        run: python -m unittest discover -s tests
      - name: Ingestion determinism smoke (dictionary + note are reproducible)
        run: |
          python -m cc_spine.cli ingest --source tests/fixtures/sample_transcript.txt \
            --source-doc-id sample-transcript --out "$RUNNER_TEMP/note_a.md"
          python -m cc_spine.cli ingest --source tests/fixtures/sample_transcript.txt \
            --source-doc-id sample-transcript --out "$RUNNER_TEMP/note_b.md"
          cmp "$RUNNER_TEMP/note_a.md" "$RUNNER_TEMP/note_b.md"
          echo "OK: ingestion is deterministic"
