name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: test (flagship - llm-log-triage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/llm-log-triage
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest -q
      - name: Smoke-test the end-to-end pipeline
        run: |
          python -m src.cli run --db /tmp/ci.db --logs data/sample_logs.jsonl
          python -m src.cli query --db /tmp/ci.db --sql sql/analysis/01_attack_overview.sql
