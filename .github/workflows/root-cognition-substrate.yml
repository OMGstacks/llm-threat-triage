name: Repo Root (llm-log-triage) — Cognition Substrate

on:
  push:
    branches: [ main ]
    paths:
      - '.cognition/memory/**'
      - '.cognition/friction/**'
      - '.cognition/codebase-index/**'
      - '.cognition/active-work/**'
      - '.github/workflows/root-cognition-substrate.yml'
  pull_request:
    paths:
      - '.cognition/memory/**'
      - '.cognition/friction/**'
      - '.cognition/codebase-index/**'
      - '.cognition/active-work/**'
      - '.github/workflows/root-cognition-substrate.yml'

# NOTE: this workflow deliberately does NOT cover .cognition/ci-governance/
# or .claude/ -- neither subsystem is instantiated or used by this project
# yet (ci-governance's self-test needs a `jsonschema` dependency this repo
# doesn't install, and .claude/'s hooks are inert here -- see MEMORY.md's
# Current State). Add both to the path filter and a corresponding test step
# together, the day either subsystem actually gets wired up -- not before,
# since an untested subsystem in the trigger path is a coverage gap, not a
# safety net.
#
# Scoped to root-level .cognition/ only (this toolkit install is
# conceptually scoped to projects/llm-log-triage, see MEMORY.md) -- distinct
# from cc-cognition-substrate.yml and osai-cognition-substrate.yml, which
# cover the same subsystems nested under their own projects.

jobs:
  toolkit-self-tests:
    name: cognition toolkit self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run friction diary self-test
        run: python3 .cognition/friction/tests/test_friction_cli_self.py
      - name: Run codebase-index framework self-test
        run: python3 .cognition/codebase-index/tests/test_framework_self.py
      - name: Run cognition-inventory generator self-test
        run: python3 .cognition/codebase-index/tests/test_cognition_inventory_generator_self.py
      - name: Run memory decay checker self-test
        run: python3 .cognition/memory/tests/test_memory_decay_self.py
      - name: Run concurrency claims registry self-test
        run: python3 .cognition/active-work/tests/test_claims_cli_self.py

  memory-gates:
    name: memory decay + size checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Memory decay check
        run: |
          python3 .cognition/memory/check_memory_decay.py \
            --file .cognition/memory/MEMORY.md \
            --repo-root . \
            --check-topic-files
      - name: Memory size check
        run: |
          python3 .cognition/memory/check_memory_size.py \
            --file .cognition/memory/MEMORY.md \
            --config .cognition/memory/.memory-lint.yml

  codebase-index-gate:
    name: cognition inventory generator drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: cognition_inventory --check (only this generator; env_var_index is a
          demo, not gated -- see cli.py's NOTE)
        working-directory: .cognition/codebase-index
        run: python3 cli.py --check --only cognition_inventory
