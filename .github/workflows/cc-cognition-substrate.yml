name: CC Master Learning Center — Cognition Substrate

on:
  push:
    branches: [ main ]
    paths:
      - 'cc-master-learning-center/.cognition/memory/**'
      - 'cc-master-learning-center/.cognition/friction/**'
      - 'cc-master-learning-center/.cognition/codebase-index/**'
      - 'cc-master-learning-center/.cognition/active-work/**'
      - '.github/workflows/cc-cognition-substrate.yml'
  pull_request:
    paths:
      - 'cc-master-learning-center/.cognition/memory/**'
      - 'cc-master-learning-center/.cognition/friction/**'
      - 'cc-master-learning-center/.cognition/codebase-index/**'
      - 'cc-master-learning-center/.cognition/active-work/**'
      - '.github/workflows/cc-cognition-substrate.yml'

# NOTE (updated 2026-07-07): this workflow deliberately does NOT cover
# cc-master-learning-center/.cognition/ci-governance/. gates.yml has since been
# authored and schema-validated (documenting the gate surface this project actually
# runs), but ci-governance's own self-test (test_gen_ci_self.py) needs a
# `jsonschema` dependency this repo doesn't install, and gen_ci.py --write has not
# been run against this real workflow file -- cc-cognition-substrate.yml is still
# hand-authored, not generated. .claude/'s hooks are no longer inert (their
# $CLAUDE_PROJECT_DIR-relative paths now resolve correctly in an interactive Claude
# Code session -- see MEMORY.md's Current State) but CI is a non-interactive runner
# that never invokes SessionStart/PreToolUse hooks regardless, so there is nothing
# for this workflow to gate there either way. Add ci-governance to the path filter
# and a corresponding test step together, the day it actually gets wired up (jsonschema
# installed + gen_ci.py adopted as the generator) -- not before, since an untested
# subsystem in the trigger path is a coverage gap, not a safety net.

jobs:
  toolkit-self-tests:
    name: cognition toolkit self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run friction diary self-test
        run: python3 cc-master-learning-center/.cognition/friction/tests/test_friction_cli_self.py
      - name: Run codebase-index framework self-test
        run: python3 cc-master-learning-center/.cognition/codebase-index/tests/test_framework_self.py
      - name: Run cognition-inventory generator self-test
        run: python3 cc-master-learning-center/.cognition/codebase-index/tests/test_cognition_inventory_generator_self.py
      - name: Run memory decay checker self-test
        run: python3 cc-master-learning-center/.cognition/memory/tests/test_memory_decay_self.py
      - name: Run concurrency claims registry self-test
        run: python3 cc-master-learning-center/.cognition/active-work/tests/test_claims_cli_self.py

  memory-gates:
    name: memory decay + size checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Memory decay check
        run: |
          python3 cc-master-learning-center/.cognition/memory/check_memory_decay.py \
            --file cc-master-learning-center/.cognition/memory/MEMORY.md \
            --repo-root cc-master-learning-center \
            --check-topic-files
      - name: Memory size check
        run: |
          python3 cc-master-learning-center/.cognition/memory/check_memory_size.py \
            --file cc-master-learning-center/.cognition/memory/MEMORY.md \
            --config cc-master-learning-center/.cognition/memory/.memory-lint.yml

  codebase-index-gate:
    name: cognition inventory generator drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: cognition_inventory --check (only this generator; env_var_index is a
          demo, not gated -- see cli.py's NOTE)
        working-directory: cc-master-learning-center/.cognition/codebase-index
        run: python3 cli.py --check --only cognition_inventory
