name: CC Spine

on:
  push:
    branches: [ main, master, "claude/**" ]
    paths:
      - "cc-master-learning-center/**"
      - ".github/workflows/cc-spine.yml"
  pull_request:
    paths:
      - "cc-master-learning-center/**"
      - ".github/workflows/cc-spine.yml"

jobs:
  spine:
    name: cc spine core (stdlib-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cc-master-learning-center/spine
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Scaffold gate (JSON, matrix, registry joins, banks, no-transcript rule)
        run: python -m cc_spine.scaffold_validate
      - name: Source-registry freshness guard (source_freshness_guard)
        run: python -m cc_spine.cli validate-sources
      - name: IP-boundary support-span guard (ip_boundary_guard)
        run: python -m cc_spine.cli check-ip
      - name: Fact-store validator (drift, tombstones, eligibility — unsupported_claim_guard)
        run: python -m cc_spine.cli factstore validate
      - name: Quiz-engine gate (gold grounding, answer-key isolation, near-duplicate stems)
        run: python -m cc_spine.cli quiz validate
      - name: Holdout-lane gate (same item gates + physical partition + no leak into practice)
        run: python -m cc_spine.cli quiz validate-holdout
      - name: Learner-export leakage scan (no answer-bearing field reaches the learner lane)
        run: |
          python -m cc_spine.cli quiz export-learner > "$RUNNER_TEMP/learner_export.json"
          if grep -qE '"(correct_index|correct|answer|answer_key_ref|answer_key_hash|item_hash|rationale_refs|rationales|distractor_misconceptions|fact_ids|expected_keywords|source_policy|status|holdout|misconception_tags)"[[:space:]]*:' "$RUNNER_TEMP/learner_export.json"; then
            echo "FAIL: learner export contains an answer-bearing field"; exit 1
          fi
          echo "OK: learner export carries no answer-bearing field"
      - name: Presented-quiz leakage scan (PR-10.3: shuffled render carries no answer/order secret)
        run: |
          python -m cc_spine.cli quiz render --attempt-seed ci-attempt > "$RUNNER_TEMP/render.json"
          if grep -qE '"(correct_index|correct|answer|answer_key_ref|answer_key_hash|item_hash|rationale_refs|rationales|distractor_misconceptions|fact_ids|expected_keywords|source_policy|status|holdout|misconception_tags|choice_order)"[[:space:]]*:' "$RUNNER_TEMP/render.json"; then
            echo "FAIL: presented quiz contains an answer-bearing field"; exit 1
          fi
          echo "OK: presented (shuffled) quiz carries no answer-bearing field"
      - name: Learner-state demo (PR-9: replay a synthetic stream; writes no learner data)
        run: python -m cc_spine.cli learner replay --attempts tests/fixtures/synthetic_attempt_stream.json --now 5
      - name: Mock-exam assembler gate (PR-10: policy-conformant draw; scenarios holdout-only)
        run: python -m cc_spine.cli mock validate --draw-key ci-mock --count 15
      - name: Mock exposure-receipt gate (PR-10.2: render path emits the burn receipt and leaks no content)
        run: |
          python -m cc_spine.cli mock render --draw-key ci-mock --count 15 > "$RUNNER_TEMP/mock_receipt.json"
          grep -q '"exposed_holdout_ids"' "$RUNNER_TEMP/mock_receipt.json" || { echo "FAIL: no exposure receipt"; exit 1; }
          if grep -qE '"(stem|choices|correct_index|correct|answer|answer_key_ref|rationale_refs|item_hash|distractor_misconceptions)"[[:space:]]*:' "$RUNNER_TEMP/mock_receipt.json"; then
            echo "FAIL: mock render leaked a content/answer-bearing field"; exit 1
          fi
          echo "OK: mock render emits the burn receipt and carries no content"
      - name: Variant-intake gate (PR-10.4b: deterministic locked prompt; good candidate drafts; attack rejected)
        run: |
          python -m cc_spine.cli variant prompt --item-id D1.1.4.scenario.0001 --draw-key ci-variant > "$RUNNER_TEMP/vprompt_a.txt"
          python -m cc_spine.cli variant prompt --item-id D1.1.4.scenario.0001 --draw-key ci-variant > "$RUNNER_TEMP/vprompt_b.txt"
          cmp "$RUNNER_TEMP/vprompt_a.txt" "$RUNNER_TEMP/vprompt_b.txt" || { echo "FAIL: prompt not deterministic"; exit 1; }
          python -m cc_spine.cli variant ingest --item-id D1.1.4.scenario.0001 --draw-key ci-variant \
            --candidate tests/fixtures/variant_candidate_good.json --out "$RUNNER_TEMP/variant-drafts"
          if python -m cc_spine.cli variant ingest --item-id D1.1.4.scenario.0001 --draw-key ci-variant \
            --candidate tests/fixtures/variant_candidate_keyed_wrong_choice.json --out "$RUNNER_TEMP/variant-drafts"; then
            echo "FAIL: attack candidate was accepted"; exit 1
          fi
          echo "OK: variant intake gates hold"
      - name: Spine test suite (stdlib unittest — no third-party deps)
        run: python -m unittest discover -s tests
      - name: Ingestion determinism smoke (dictionary + note are reproducible)
        run: |
          python -m cc_spine.cli ingest --source tests/fixtures/sample_transcript.txt \
            --source-doc-id sample-transcript --out "$RUNNER_TEMP/note_a.md"
          python -m cc_spine.cli ingest --source tests/fixtures/sample_transcript.txt \
            --source-doc-id sample-transcript --out "$RUNNER_TEMP/note_b.md"
          cmp "$RUNNER_TEMP/note_a.md" "$RUNNER_TEMP/note_b.md"
          echo "OK: ingestion is deterministic"
