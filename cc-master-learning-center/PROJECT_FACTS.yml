# PROJECT_FACTS.yml
#
# Copy this file to PROJECT_FACTS.yml in your project root and fill in the
# fields that apply. This is the ONE file the generalized CLAUDE.md modules,
# slash commands, and hooks in this toolkit are designed to reference for
# project-specific facts (host names, paths, conventions) — the goal is that
# adopting a new project means editing this one file instead of hand-editing
# CLAUDE.md plus eight separate command markdown files, each of which would
# otherwise carry its own copy of the same host/path facts and drift apart.
#
# Every field below is commented out with an example value. Uncomment and
# edit the ones that apply to your project; leave the rest commented out or
# delete them. A missing field means "not applicable to this project" — the
# commands/modules that read this file are written to degrade gracefully
# (skip the step, note it as N/A) rather than fail when a section is absent.
#
# This file is a plain facts sheet, not a secrets store — never put an
# actual password, API key, or token in this file. Use secret_locations
# below to record WHERE the secret lives (a path, a secrets manager key,
# an env var name), never the secret value itself.

# ---------------------------------------------------------------------------
# Remote deploy target
# ---------------------------------------------------------------------------
# Fill this in if your project deploys to a remote host you SSH into or
# otherwise administer directly (VPS, bare-metal, cloud VM). Corresponds to
# CLAUDE-MD/modules/deploy-surface.md and commands/deploy-ops.md.

# deploy_host:
#   primary: "deploy@203.0.113.10"          # user@host or user@ip you SSH into by default
#   alternate: "deploy@100.64.0.5"          # e.g. a VPN/tailnet overlay address, if one exists
#   alternate_use_when: "on the tailnet"    # short note on when to prefer the alternate
#   never_use: "root@*"                     # explicitly forbidden login pattern, if any, and why
#   never_use_reason: "root login disabled; deploy user is the only account with a key on file"

# deploy_user: "deploy"                     # canonical non-root account with deploy rights

# app_directory: "/opt/myapp"               # absolute path to the app on the remote host

# ---------------------------------------------------------------------------
# Secrets — locations only, never values
# ---------------------------------------------------------------------------

# secret_locations:
#   db_password: "/run/secrets/db_password"          # path inside the running container/host
#   api_key_env_var: "MYAPP_API_KEY"                 # name of the env var, not its value
#   secrets_manager: "not applicable"                 # e.g. "AWS Secrets Manager: myapp/prod/*"

# ---------------------------------------------------------------------------
# Container / runtime topology
# ---------------------------------------------------------------------------
# Fill this in if your deploy target runs multiple containers/processes and
# it's non-obvious which one talks to which (e.g. "the host's own postgres is
# stale; the app container talks to a separate db container").

# container_topology:
#   app_container: "myapp-web"
#   db_container: "myapp-db"
#   notes: >
#     myapp-web connects to myapp-db over the docker network; the host's own
#     postgres on :5432 is NOT the one the app uses and may be stale/absent.
#   exec_pattern_sql: 'docker exec myapp-db psql -U myapp -d myapp -c "<sql>"'
#   exec_pattern_python: 'docker exec myapp-web python -c "..."'

# ---------------------------------------------------------------------------
# Database migrations
# ---------------------------------------------------------------------------
# Fill this in if your project has a versioned database schema. Corresponds
# to CLAUDE-MD/modules/database-migrations.md and commands/migration.md.

# migration_directory_convention:
#   path: "migrations/"
#   filename_pattern: "NNN_description.sql"     # e.g. zero-padded numeric prefix + snake_case
#   prefix_source_of_truth: "origin/main"       # branch to check for the next free prefix against
#   next_prefix_script: "scripts/next_migration_prefix.py"   # if you have one; else omit

# ---------------------------------------------------------------------------
# Scheduled data pipelines
# ---------------------------------------------------------------------------
# Fill this in if your project has scheduled jobs whose output other things
# depend on. Corresponds to CLAUDE-MD/modules/pipeline-automation-levels.md.

# scheduled_pipelines:
#   manifest_path: "deploy/cron_manifest.yml"    # where cron entries are declared, if any
#   scheduler_entrypoint: "pipeline/scheduler.py"  # if pipelines are triggered from in-process code
#   freshness_ledger_table: "not applicable"      # DB table tracking pipeline output freshness, if any

# ---------------------------------------------------------------------------
# Automated remediation / watchdogs
# ---------------------------------------------------------------------------
# Fill this in if your project runs any loop that can restart/disable/mutate
# a live service without a human approving each action. Corresponds to
# CLAUDE-MD/modules/automated-remediation.md.

# automated_remediation:
#   watchdog_script: "deploy/host_watchdog.sh"
#   services_it_can_restart: ["myapp-web"]
#   cooldown_seconds: 300
#   max_attempts_before_alert: 3

# ---------------------------------------------------------------------------
# Git / branching conventions
# ---------------------------------------------------------------------------

# default_branch_name: "main"                 # or "master", "trunk", etc.

# ---------------------------------------------------------------------------
# Cognition OS toolkit component locations (usually the installer's defaults)
# ---------------------------------------------------------------------------
# Only change these if you moved a component to a non-default location after
# running init.py.

# memory_file_path: ".cognition/memory/MEMORY.md"
# friction_log_path: ".cognition/friction/friction_log.jsonl"
# gates_file_path: ".cognition/ci-governance/gates.yml"
# codebase_index_output_dir: "docs/generated/"

# ---------------------------------------------------------------------------
# CI
# ---------------------------------------------------------------------------

# ci_provider: "github-actions"                # or "gitlab-ci", "circleci", etc.
# ci_workflow_path: ".github/workflows/ci.yml"
# local_ci_script_path: "scripts/local_ci.sh"
